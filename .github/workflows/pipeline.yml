name: VPP Production Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # STAGE 1 & 2: LINT & TEST
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Linting (Code Quality)
        run: flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Unit Tests (Reliability)
        # We set PYTHONPATH to . so 'from app.main' works correctly
        env:
          PYTHONPATH: .
        run: pytest app/test_main.py

  # STAGE 3: SECURITY SCAN
  security-scan:
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Vulnerability Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          severity: 'CRITICAL,HIGH'
          exit-code: '1' # Fails the build if vulnerabilities are found

  # STAGE 4 & 5: BUILD & PUSH
  build-and-push:
    needs: security-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            paulnaeem/vpp-demo:latest
            paulnaeem/vpp-demo:${{ github.sha }}